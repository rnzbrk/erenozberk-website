project:
  type: website
  output-dir: _site
  resources:
    - "../index.html"   # copies portfolio to site root

website:
  title: "Dr. Eren Halil Özberk"
  description: "Psychometrics, AI Assessment, and Measurement Science"
  navbar: false
  favicon: ""

  # Blog listing lives at /blog/
  page-navigation: true

format:
  html:
    theme: [cosmo, custom.scss]
    toc: true
    code-copy: true
    code-overflow: wrap
    fig-align: center
    link-external-newwindow: true

execute:
  freeze: auto     # re-run only changed posts
  cache: true
