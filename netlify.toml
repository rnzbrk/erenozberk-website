[build]
  # Renders the Quarto blog, then copies the static portfolio to site root
  command   = "quarto render blog && cp index.html blog/_site/index.html"
  publish   = "blog/_site"

[build.environment]
  QUARTO_VERSION = "1.5.0"

# Redirect /blog to the listing page
[[redirects]]
  from   = "/"
  to     = "/blog/"
  status = 200
  force  = false
